<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>My Library — MangaHub</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">M</div><span class="logo-text">MangaHub</span></div>
    <div style="flex:1;overflow-y:auto;padding-bottom:8px;">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Main</div>
        <div class="nav-item" data-href="/dashboard"><span class="nav-icon">🏠</span>Dashboard</div>
        <div class="nav-item" data-href="/browse"><span class="nav-icon">🔍</span>Browse</div>
        <div class="nav-item active" data-href="/library"><span class="nav-icon">📚</span>My Library</div>
        <div class="nav-item" data-href="/history"><span class="nav-icon">🕐</span>History</div>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Community</div>
        <div class="nav-item" data-href="/chat"><span class="nav-icon">💬</span>Chat</div>
        <div class="nav-item" data-href="/notifications"><span class="nav-icon">🔔</span>Notifications<span class="nav-badge notif-badge hidden">0</span></div>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Account</div>
        <div class="nav-item" data-href="/stats"><span class="nav-icon">📊</span>Statistics</div>
        <div class="nav-item" data-href="/settings"><span class="nav-icon">⚙️</span>Settings</div>
        <div class="nav-item" data-href="/admin"><span class="nav-icon">🛡️</span>Admin</div>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-info" onclick="location.href='/settings'"><div class="user-avatar" data-user-avatar></div>
        <div><div class="user-name" data-user-name>Loading...</div><div class="user-role" data-user-role>user</div></div>
      </div>
      <button id="logout-btn" class="btn btn-ghost btn-sm btn-full mt-8" style="color:var(--red);border-color:rgba(239,68,68,0.2);">🚪 Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div style="flex:1;"><h2 style="font-size:18px;font-weight:700;">My Library</h2></div>
      <a href="/browse" class="btn btn-primary btn-sm">+ Add Manga</a>
    </div>

    <div class="page-body">
      <div id="tab-container">
        <div class="tabs">
          <button class="tab-btn active" data-tab="tab-all"    onclick="switchTab('all')">All</button>
          <button class="tab-btn" data-tab="tab-reading"       onclick="switchTab('reading')">📖 Reading</button>
          <button class="tab-btn" data-tab="tab-completed"     onclick="switchTab('completed')">✅ Completed</button>
          <button class="tab-btn" data-tab="tab-plan"          onclick="switchTab('plan_to_read')">📌 Plan to Read</button>
          <button class="tab-btn" data-tab="tab-on_hold"       onclick="switchTab('on_hold')">⏸ On Hold</button>
          <button class="tab-btn" data-tab="tab-dropped"       onclick="switchTab('dropped')">❌ Dropped</button>
        </div>
        <div id="library-content" style="margin-top:20px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Progress Update Modal -->
<div class="modal-backdrop" id="progress-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="progress-modal-title">Update Progress</h3>
      <button class="modal-close" onclick="Modal.close('progress-modal')">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <input type="hidden" id="edit-entry-id">
      <input type="hidden" id="edit-manga-max">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Current Chapter</label>
          <input id="edit-chapter" type="number" class="form-input" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Current Volume</label>
          <input id="edit-volume" type="number" class="form-input" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="edit-status" class="form-input">
          <option value="reading">📖 Reading</option>
          <option value="completed">✅ Completed</option>
          <option value="plan_to_read">📌 Plan to Read</option>
          <option value="on_hold">⏸ On Hold</option>
          <option value="dropped">❌ Dropped</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Your Rating (0–10)</label>
        <input id="edit-rating" type="number" class="form-input" min="0" max="10" step="0.5" placeholder="Optional">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="edit-notes" class="form-input" rows="2" placeholder="Optional notes..."></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:space-between;">
        <button class="btn btn-danger btn-sm" onclick="removeFromLibrary()">🗑 Remove</button>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" onclick="Modal.close('progress-modal')">Cancel</button>
          <button class="btn btn-primary" onclick="saveProgress()">💾 Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/mhub_main.js?v=1775507111480"></script>
<script>
let activeFilter = new URLSearchParams(location.search).get('status') || '';

function switchTab(status) {
  activeFilter = status === 'all' ? '' : status;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabMap = { '': 'tab-all', reading: 'tab-reading', completed: 'tab-completed', plan_to_read: 'tab-plan', on_hold: 'tab-on_hold', dropped: 'tab-dropped' };
  document.querySelector(`[data-tab="${tabMap[activeFilter]||'tab-all'}"]`)?.classList.add('active');
  loadLibrary();
}

async function loadLibrary() {
  const el = document.getElementById('library-content');
  el.innerHTML = `<div class="manga-grid">${skeletonMangaCards(6)}</div>`;
  const url = '/api/library' + (activeFilter ? `?status=${activeFilter}` : '');
  try {
    const res = await API.get(url);
    if (!res.success) { el.innerHTML = '<div style="color:var(--text-3);">Failed to load library.</div>'; return; }
    const entries = res.data || [];
    if (!entries.length) {
      el.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-3);">
        <div style="font-size:48px;margin-bottom:12px;">📭</div>
        <h3 style="margin-bottom:8px;">No manga here yet</h3>
        <p>Head to <a href="/browse" style="color:var(--accent-2);">Browse</a> and add some!</p>
      </div>`;
      return;
    }
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px;">
      ${entries.map(renderLibraryItem).join('')}
    </div>`;
  } catch(err){
    el.innerHTML = '<div style="color:var(--text-3);">Error loading library.</div>';
  }
}

function renderLibraryItem(e) {
  const m = e.manga;
  const pct = m.chapter_count > 0 ? Math.min(100, Math.round((e.current_chapter / m.chapter_count) * 100)) : 0;
  const cover = m.cover_url || '/static/img/placeholder.svg';
  return `<div class="card" style="display:flex;gap:16px;align-items:center;">
    <img src="${cover}" style="width:56px;height:76px;object-fit:cover;border-radius:6px;flex-shrink:0;cursor:pointer;" onclick="location.href='/manga/${m.id}'" onerror="this.src='/static/img/placeholder.svg'">
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
        <strong style="font-size:15px;cursor:pointer;" onclick="location.href='/manga/${m.id}'">${m.title}</strong>
        ${statusBadge(e.status)}
      </div>
      <div style="font-size:13px;color:var(--text-2);margin-bottom:8px;">Ch.${e.current_chapter} / ${m.chapter_count||'?'} ${e.current_volume ? `· Vol.${e.current_volume}` : ''} ${e.rating ? `· ★ ${e.rating}` : ''}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--text-3);margin-top:4px;">${pct}% complete</div>
    </div>
    <button class="btn btn-secondary btn-sm" onclick='openProgressModal(${JSON.stringify(e)})'>✏️ Update</button>
  </div>`;
}

function openProgressModal(entry) {
  document.getElementById('edit-entry-id').value = entry.id;
  document.getElementById('edit-manga-max').value = entry.manga?.chapter_count || 0;
  document.getElementById('progress-modal-title').textContent = `Update: ${entry.manga?.title}`;
  document.getElementById('edit-chapter').value = entry.current_chapter;
  document.getElementById('edit-volume').value = entry.current_volume;
  document.getElementById('edit-status').value = entry.status;
  document.getElementById('edit-rating').value = entry.rating || '';
  document.getElementById('edit-notes').value = entry.notes || '';
  Modal.open('progress-modal');
}

async function saveProgress() {
  const id = document.getElementById('edit-entry-id').value;
  const maxCh = parseInt(document.getElementById('edit-manga-max').value) || 0;
  const chapter = parseInt(document.getElementById('edit-chapter').value) || 0;
  const volume  = parseInt(document.getElementById('edit-volume').value) || 0;
  const status  = document.getElementById('edit-status').value;
  const rating  = parseFloat(document.getElementById('edit-rating').value) || null;
  const notes   = document.getElementById('edit-notes').value;
  if (maxCh > 0 && chapter > maxCh) { Toast.error(`Chapter cannot exceed ${maxCh}`); return; }
  const res = await API.put(`/api/library/${id}/progress`, { current_chapter: chapter, current_volume: volume, status, rating, notes });
  if (res.success) { Toast.success('Progress updated!'); Modal.close('progress-modal'); loadLibrary(); }
  else Toast.error(res.error || 'Failed to update');
}

async function removeFromLibrary() {
  const id = document.getElementById('edit-entry-id').value;
  if (!confirm('Remove this manga from your library?')) return;
  const res = await API.delete(`/api/library/${id}`);
  if (res.success) { Toast.success('Removed from library'); Modal.close('progress-modal'); loadLibrary(); }
  else Toast.error(res.error || 'Failed to remove');
}

document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.guard()) return;
  // Activate correct tab from URL
  if (activeFilter) {
    const tabMap = { reading: 'tab-reading', completed: 'tab-completed', plan_to_read: 'tab-plan', on_hold: 'tab-on_hold', dropped: 'tab-dropped' };
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-tab="${tabMap[activeFilter]||'tab-all'}"]`)?.classList.add('active');
  }
  loadLibrary();
});
</script>
</body>
</html>
